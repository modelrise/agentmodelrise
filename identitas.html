<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RISE - Identitas Singkat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; background: url('bg1.png') no-repeat center center fixed; background-size: cover; }
    .overlay { position: relative; min-height: 100vh; width: 100%; background: linear-gradient(135deg, rgba(30, 27, 75, 0.8) 0%, rgba(49, 46, 129, 0.8) 100%); display: flex; align-items: center; justify-content: center; }
  </style>
</head>

<body class="pt-16">

  <!-- NAVBAR -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex-shrink-0">
          <a href="index.html" class="text-2xl font-black text-blue-600">RISE <span class="text-gray-700">| Langkah Awal</span></a>
        </div>
        <div class="hidden md:flex items-center gap-4">
          <a href="identitas.html" class="bg-blue-600 text-white px-6 py-2.5 rounded-full text-base font-semibold hover:bg-blue-700 transition shadow-lg">Mulai Sekarang</a>
          <a href="login.html" class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-full text-base font-semibold hover:bg-gray-200 transition border border-gray-300">Login</a>
        </div>
        <div class="md:hidden">
          <button id="mobile-menu-btn" class="text-gray-700 p-2 rounded-md hover:bg-gray-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
          </button>
        </div>
      </div>
    </div>
    <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-200">
      <div class="px-4 py-4 space-y-3">
        <a href="identitas.html" class="block w-full bg-blue-600 text-white px-6 py-3 rounded-full text-center">Mulai Sekarang</a>
        <a href="login.html" class="block w-full bg-gray-100 text-gray-700 px-6 py-3 rounded-full text-center border">Login</a>
      </div>
    </div>
  </nav>

  <!-- Form Identitas -->
  <div class="overlay py-16 px-4">
    <div class="max-w-lg w-full bg-white/95 p-8 md:p-10 rounded-2xl shadow-2xl backdrop-blur-sm">
      <div class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-black mb-3 text-indigo-900">Buat Akun Baru</h1>
        <p class="text-indigo-600 text-base"> isi data diri & buat password</p>
      </div>

      <div id="alert-error" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-6 text-center"></div>

      <form id="form-identitas" class="space-y-5">
        <div>
          <label for="nama" class="block text-sm font-semibold mb-2 text-indigo-900">Nama / Inisial</label>
          <input type="text" id="nama" placeholder="Contoh: A.R." class="w-full px-4 py-3 rounded-xl text-gray-900 focus:ring-2 focus:ring-blue-400 bg-indigo-50 border border-indigo-200" required>
        </div>

        <div>
          <label for="username" class="block text-sm font-semibold mb-2 text-indigo-900">Username</label>
          <input type="text" id="username" placeholder="Buat username unique" class="w-full px-4 py-3 rounded-xl text-gray-900 focus:ring-2 focus:ring-blue-400 bg-indigo-50 border border-indigo-200" required>
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold mb-2 text-indigo-900">Password</label>
          <input type="password" id="password" placeholder="Buat password" class="w-full px-4 py-3 rounded-xl text-gray-900 focus:ring-2 focus:ring-blue-400 bg-indigo-50 border border-indigo-200" required>
        </div>

        <div>
          <label for="kampus" class="block text-sm font-semibold mb-2 text-indigo-900">Asal Kampus</label>
          <input type="text" id="kampus" placeholder="Contoh: Politeknik Negeri Medan" class="w-full px-4 py-3 rounded-xl text-gray-900 focus:ring-2 focus:ring-blue-400 bg-indigo-50 border border-indigo-200" required>
        </div>

        <div>
          <label for="prodi" class="block text-sm font-semibold mb-2 text-indigo-900">Program Studi</label>
          <input type="text" id="prodi" placeholder="Contoh: Teknik Mesin" class="w-full px-4 py-3 rounded-xl text-gray-900 focus:ring-2 focus:ring-blue-400 bg-indigo-50 border border-indigo-200" required>
        </div>

        <div>
          <label for="usia" class="block text-sm font-semibold mb-2 text-indigo-900">Usia</label>
          <input type="number" id="usia" placeholder="Contoh: 19" min="15" max="100" class="w-full px-4 py-3 rounded-xl text-gray-900 focus:ring-2 focus:ring-blue-400 bg-indigo-50 border border-indigo-200" required>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-full hover:bg-blue-700 transition transform hover:scale-105 shadow-xl mt-6">Buat Akun</button>
      </form>

      <div class="text-center mt-6">
        <p class="text-indigo-600">Sudah punya akun? <a href="login.html" class="text-blue-600 font-bold hover:underline">Login</a></p>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('form-identitas');
    const alertError = document.getElementById('alert-error');

    // Cek jika username sudah ada
    const cekUsername = localStorage.getItem('rise_username_' + document.getElementById('username').value);

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      alertError.classList.add('hidden');

      const nama = document.getElementById('nama').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const kampus = document.getElementById('kampus').value.trim();
      const prodi = document.getElementById('prodi').value.trim();
      const usia = document.getElementById('usia').value.trim();

      if (!nama || !username || !password || !kampus || !prodi || !usia) {
        alertError.textContent = 'Mohon isi semua kolom!';
        alertError.classList.remove('hidden');
        return;
      }

      const userKey = 'rise_user_' + username;
      const existingUser = localStorage.getItem(userKey);
      if (existingUser) {
        alertError.textContent = 'Username sudah terdaftar. Silakan pilih username lain atau login.';
        alertError.classList.remove('hidden');
        return;
      }

      // SIMPAN - username sbg key, password sbg verification
      const userData = { nama, username, password, kampus, prodi, usia };
      localStorage.setItem(userKey, JSON.stringify(userData));
      
      // Langsung login & simpan session
      localStorage.setItem('rise_session', username);
      
      window.location.href = 'rise-form.html';
    });

    const mobileBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    mobileBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
  </script>

</body>
</html>
